services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: autolibre:dev
    ports: ["8083:8083"]
    volumes:
      - ../config.toml:/app/config.toml:ro
      - library_data:/app/storage
    environment:
      APP_DATABASE_URL: sqlite:///app/storage/library.db
    depends_on:
      - meilisearch

  meilisearch:
    image: getmeili/meilisearch:v1.7
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-development}
      - MEILI_NO_ANALYTICS=true
    volumes:
      - meili_data:/meili_data
    ports: ["7700:7700"]

  # prometheus:
