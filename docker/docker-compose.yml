services:
  app:
    build: .
    ports: ["8083:8083"]
    volumes:
      - ./config.toml:/app/config.toml:ro
      - library_data:/app/storage
    environment:
      - APP_DATABASE__URL=sqlite:///app/storage/library.db
    depends_on: [meilisearch]

  meilisearch:
    image: getmeili/meilisearch:latest
    volumes:
      - meili_data:/meili_data

volumes:
  library_data:
  meili_data:

