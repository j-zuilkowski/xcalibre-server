[app]
# LOG_FORMAT=text for human-readable output
base_url = "http://localhost:8083"
storage_path = "./storage"

[network]
# allow_private_endpoints = false
# Set to true to allow LLM endpoints and webhook targets on
# private/loopback addresses. Also configurable as
# llm.allow_private_endpoints for backwards compatibility.

[database]
url = "sqlite://library.db"

[auth]
jwt_secret = ""
access_token_ttl_mins = 15
refresh_token_ttl_days = 30
max_login_attempts = 10
lockout_duration_mins = 15

[auth.proxy]
enabled = false
header = "x-remote-user"
# Restrict to requests from the reverse proxy only.
# trusted_cidrs = ["127.0.0.1/32", "::1/128", "10.0.0.0/8"]

[llm]
enabled = false
# Legacy compatibility only; prefer [network].
# allow_private_endpoints = false
# Override model used for /v1/embeddings — set this when your embedding model
# (e.g. nomic-embed-text-v1.5) differs from the chat model in llm.librarian.model.
# embedding_model = "nomic-embed-text-v1.5"

[storage]
backend = "local"   # "local" or "s3"

# Only required when backend = "s3"
[storage.s3]
bucket       = "my-xcalibre-server-library"
region       = "us-east-1"
endpoint_url = ""   # Override for MinIO / Backblaze B2 / Cloudflare R2
                    # Example (MinIO): "http://minio.local:9000"
                    # Example (R2):    "https://<account_id>.r2.cloudflarestorage.com"
access_key   = ""
secret_key   = ""
key_prefix   = ""   # Optional. Example: "xcalibre-server/" stores all files under that prefix

[llm.librarian]
endpoint = "http://192.168.0.72:1234/v1"
model = ""
timeout_secs = 10
system_prompt = ""

[llm.architect]
endpoint = "http://localhost:1234/v1"
model = ""
timeout_secs = 10
system_prompt = ""

[limits]
upload_max_bytes = 524288000
rate_limit_per_ip = 200
